version: '3.8'

services:
  # 1. The Secure Vault (Database)
  postgres:
    image: postgres:15
    container_name: concierge-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: concierge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The Sticky-Note Memory (Cache)
  redis:
    image: redis:7
    container_name: concierge-redis
    ports:
      - "6379:6379"

  # 3. The Mailroom (Message Broker - KRaft mode, no Zookeeper needed)
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: concierge-kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # Two listeners:
      # - INTERNAL for other containers (kafka:9092)
      # - EXTERNAL for your host machine (localhost:29092)
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL

      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/bitnami/kafka

  # The Conveyor Belt: Kafka UI (Optional but useful for debugging Kafka)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: concierge-kafka-ui
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=concierge-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "8085:8080"

  # 4. The Security Guard (OAuth2 Provider)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: concierge-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: "edge"
    ports:
      - "127.0.0.1:9080:8080"
    depends_on:
      - postgres

    # 5. The Glassmorphic Canvas (React Frontend)
  frontend:
    image: node:20
    container_name: concierge-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    # This tells the container to install dependencies and start Vite
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
  kafka_data: